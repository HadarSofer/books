<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --cream: #fbf4e8;
      --coffee: #5a321d;
      --espresso: #2a160c;
      --caramel: #b77945;
      --white: #fffdf8;
      --shadow: 0 24px 70px rgba(65,35,17,.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Assistant', Arial, sans-serif;
      background: var(--cream);
      color: var(--espresso);
      line-height: 1.75;
      font-size: 18px;
    }
    .container { width: min(1120px, 92vw); margin: auto; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 15px 28px;
      border-radius: 999px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 12px 30px rgba(80,40,20,.12);
      transition: .25s;
      width: 100%;
    }
    .btn:hover { transform: translateY(-3px); }
  </style>
</head>

          </p>
          <a class="btn" style="background: #b77945; color: white; box-shadow: 0 8px 20px rgba(183,121,69,0.25);" href="https://meshulam.co.il/purchase?b=f9c1762773a8a9f286a3632289c96ef9" target="_blank" rel="noopener">

      <div style="font-size: 14px; color: #f4dfca; opacity: 0.8;">

      </div>
    </div>
  </main>

</body>
</html>
